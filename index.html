<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goa Games</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:#fff;
}

.bg{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#ffcc0066,transparent 35%),
radial-gradient(circle at bottom,#00e5ff44,transparent 30%);
filter:blur(20px);
}

.card{
position:relative;
width:95%;
max-width:430px;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
text-align:center;
border:1px solid rgba(255,255,255,.15);
box-shadow:0 20px 40px rgba(0,0,0,.4);
animation:up .8s ease;
}

@keyframes up{
from{
transform:translateY(40px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

.logo{
width:95px;
height:95px;
margin:auto;
border-radius:50%;
background:linear-gradient(45deg,#FFD700,#FFA500);
display:flex;
align-items:center;
justify-content:center;
font-size:45px;
box-shadow:0 0 25px #FFD700;
margin-bottom:20px;
}

h1{
font-size:34px;
margin-bottom:10px;
font-weight:800;
}

.tag{
font-size:17px;
opacity:.9;
margin-bottom:25px;
}

.features{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:25px;
}

.box{
background:rgba(255,255,255,.08);
padding:14px;
border-radius:15px;
font-weight:600;
font-size:14px;
}

.btn{
display:inline-block;
padding:16px 38px;
background:#229ED9;
color:#fff;
font-size:19px;
font-weight:700;
border-radius:50px;
text-decoration:none;
transition:.3s;
box-shadow:0 10px 25px rgba(34,158,217,.4);
}

.btn:hover{
transform:scale(1.05);
}

.timer{
margin-top:18px;
font-size:14px;
opacity:.85;
}

.footer{
margin-top:20px;
font-size:12px;
opacity:.6;
}
</style>

<script>
let seconds=5;

function countdown(){

document.getElementById("count").innerHTML=seconds;

if(seconds==0){
window.location.href="https://t.me/goadgammes";
}

seconds--;

}

setInterval(countdown,1000);
</script>

</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="logo">🎮</div>

<h1>GOA GAMES</h1>

<p class="tag">
🔥 Join the Fastest Growing Gaming Community!
</p>

<div class="features">

<div class="box">💰 Big Rewards</div>

<div class="box">🏆 Huge Prizes</div>

<div class="box">⚡ Instant Updates</div>

<div class="box">🎁 Daily Events</div>

</div>

<a class="btn" href="https://t.me/goadgammes">
Join Telegram
</a>

<div class="timer">
Redirecting automatically in <span id="count">5</span> seconds...
</div>

<div class="footer">
© Goa Games
</div>

</div>

</body>
</html>
